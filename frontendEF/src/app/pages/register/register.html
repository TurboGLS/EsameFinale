<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <div class="register-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z" />
        </svg>
      </div>
      <h1 class="register-title">Crea il tuo account</h1>
      <p class="register-subtitle">Registrati per iniziare</p>
    </div>

    <form (ngSubmit)="register()" [formGroup]="registerFrom" class="register-form">
      <div class="row g-3 mb-3">
        <div class="col-12 col-sm-6">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" formControlName="firstName" placeholder="Mario" />
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" formControlName="lastName" placeholder="Rossi" />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Picture URL</label>
        <input type="text" class="form-control" formControlName="picture" placeholder="https://..." />
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" formControlName="username" placeholder="nome@esempio.com" autocomplete="username" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="password-field">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="password"
            placeholder="Almeno 8 caratteri" autocomplete="new-password" />
          <button type="button" class="password-toggle" (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z" />
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0" />
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7 7 0 0 0 2.79-.588M5.21 3.088A7 7 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474z" />
              <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        {{ loading ? 'Registrazione in corso...' : 'Register' }}
      </button>
    </form>

    <p class="register-footer">
      Hai già un account?
      <a routerLink="/login">Accedi</a>
    </p>
  </div>
</div>
