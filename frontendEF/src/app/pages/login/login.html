<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
          <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
        </svg>
      </div>
      <h1 class="login-title">Bentornato</h1>
      <p class="login-subtitle">Accedi al tuo account per continuare</p>
    </div>

    <form (ngSubmit)="login()" [formGroup]="loginForm" class="login-form">
      <!-- Email input -->
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control form-control-lg" formControlName="username"
          placeholder="nome@esempio.com" autocomplete="username" />
      </div>

      <!-- Password input -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="password-field">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control form-control-lg" formControlName="password"
            placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="password-toggle" (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z" />
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0" />
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7 7 0 0 0 2.79-.588M5.21 3.088A7 7 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474z" />
              <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="alert alert-danger py-2" *ngIf="loginError">
        {{ loginError }}
      </div>

      <!-- Submit button -->
      <button type="submit" class="btn btn-primary btn-lg w-100">Sign in</button>
    </form>

    <p class="login-footer">
      Non hai ancora un account?
      <a href="javascript:void(0)" (click)="goToRegister()">Registrati</a>
    </p>
  </div>
</div>
