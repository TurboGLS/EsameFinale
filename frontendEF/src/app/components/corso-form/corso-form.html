<form [formGroup]="corsoForm" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label class="form-label">Titolo</label>
    <input type="text" class="form-control" formControlName="titolo" placeholder="Titolo del corso" />
    <div class="text-danger small mt-1"
      *ngIf="corsoForm.get('titolo')?.touched && corsoForm.get('titolo')?.invalid">
      Il titolo è obbligatorio.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Descrizione</label>
    <textarea class="form-control" rows="2" formControlName="descrizione"></textarea>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Categoria</label>
      <select class="form-select" formControlName="categoria">
        <option value="">Seleziona una categoria</option>
        <option *ngFor="let c of categorie" [value]="c.id">{{ c.nomeCategoria }}</option>
      </select>
      <div class="text-danger small mt-1"
        *ngIf="corsoForm.get('categoria')?.touched && corsoForm.get('categoria')?.invalid">
        La categoria è obbligatoria.
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label">Durata (ore)</label>
      <input type="number" min="1" class="form-control" formControlName="durataOre" />
      <div class="text-danger small mt-1"
        *ngIf="corsoForm.get('durataOre')?.touched && corsoForm.get('durataOre')?.invalid">
        La durata deve essere maggiore di zero.
      </div>
    </div>
  </div>

  <div class="d-flex gap-4 mt-3">
    <div class="form-check">
      <input type="checkbox" class="form-check-input" id="obbligatorio" formControlName="obbligatorio" />
      <label class="form-check-label" for="obbligatorio">Obbligatorio</label>
    </div>
    <div class="form-check">
      <input type="checkbox" class="form-check-input" id="attivo" formControlName="attivo" />
      <label class="form-check-label" for="attivo">Attivo</label>
    </div>
  </div>

  <div class="d-flex gap-2 mt-4">
    <button type="submit" class="btn btn-primary" [disabled]="salvataggioInCorso">
      <span *ngIf="salvataggioInCorso" class="spinner-border spinner-border-sm me-2"></span>
      Salva
    </button>
    <button type="button" class="btn btn-outline-secondary" (click)="annulla.emit()">Annulla</button>
  </div>
</form>
