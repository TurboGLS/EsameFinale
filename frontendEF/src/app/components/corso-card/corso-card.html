<div class="card h-100 shadow-sm corso-card">
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title mb-0">{{ corso.titolo }}</h5>
      <span class="badge" [ngClass]="corso.attivo ? 'bg-success' : 'bg-secondary'">
        {{ corso.attivo ? 'Attivo' : 'Non attivo' }}
      </span>
    </div>

    <div class="mb-2 d-flex gap-2 flex-wrap">
      <span class="badge rounded-pill text-bg-light border">{{ corso.categoria.nomeCategoria }}</span>
      <span *ngIf="corso.obbligatorio" class="badge rounded-pill text-bg-warning">Obbligatorio</span>
    </div>

    <p class="text-muted small mb-2" *ngIf="corso.descrizione">{{ corso.descrizione }}</p>

    <ul class="list-unstyled small mb-3">
      <li><strong>Durata:</strong> {{ corso.durataOre }} ore</li>
    </ul>

    <div class="mt-auto d-flex gap-2 flex-wrap">
      <button type="button" class="btn btn-outline-primary btn-sm" (click)="modifica.emit(corso)">
        Modifica
      </button>
      <button *ngIf="corso.attivo" type="button" class="btn btn-outline-secondary btn-sm"
        (click)="disattiva.emit(corso)">
        Disattiva
      </button>
      <button type="button" class="btn btn-outline-danger btn-sm" (click)="elimina.emit(corso)">
        Elimina
      </button>
    </div>
  </div>
</div>
